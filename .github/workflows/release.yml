name: Release

# Publishes to PyPI using Trusted Publishing (OIDC) — no API token needed.
# Manual trigger so it never red-fails before the trusted publisher is configured.
# One-time setup on pypi.org -> Publishing -> Add a pending publisher:
#   PyPI project name: llm-localfirst
#   Owner: shaxzodbek-uzb   Repository: llm-localfirst
#   Workflow name: release.yml   Environment: pypi
# Then run this workflow from the Actions tab (or `gh workflow run release.yml`).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
